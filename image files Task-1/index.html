<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>My Image Gallery</h1>

<!-- Filter Buttons -->
<div class="filters">
  <button onclick="filterImages('all')">All</button>
  <button onclick="filterImages('nature')">Nature</button>
  <button onclick="filterImages('city')">City</button>
</div>

<!-- Gallery -->
<div class="gallery">
  <img src="https://picsum.photos/id/1015/300/200" class="image nature">
  <img src="https://picsum.photos/id/1011/300/200" class="image nature">
  <img src="https://picsum.photos/id/1012/300/200" class="image city">
  <img src="https://picsum.photos/id/1016/300/200" class="image city">
  <img src="https://picsum.photos/id/1020/300/200" class="image nature">
  <img src="https://picsum.photos/id/1024/300/200" class="image city">
</div>

<!-- Lightbox -->
<div id="lightbox">
  <span id="close">&times;</span>
  <img id="lightbox-img">
  <button id="prev">&#10094;</button>
  <button id="next">&#10095;</button>
</div>

<script src="script.js"></script>
</body>
</html>
